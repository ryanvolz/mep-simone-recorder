---
channel0:
    basic_network:
        dst_port: 60134 # UDP destination port for packets
    spectrogram_mqtt:
        service_name: recorder_fft_ch000
    spectrogram_output:
        plot_subdir: spectrograms/ch000
    drf_sink:
        channel_dir: simone/ch000

channel1:
    enabled: true
    pipeline:
        spectrogram: false
    basic_network:
        dst_port: 60133 # UDP destination port for packets
    spectrogram_mqtt:
        service_name: recorder_fft_ch001
    spectrogram_output:
        plot_subdir: spectrograms/ch001
    drf_sink:
        channel_dir: simone/ch001
